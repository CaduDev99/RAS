<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Ocorrência</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Ajustes específicos para esta página de sucesso */
        .success-icon {
            font-size: 4rem;
            margin-bottom: 10px;
            z-index: 1;
        }
        
        .protocolo-box {
            background: #e3f2fd !important;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            margin: 20px 0;
            border-style: dashed !important;
            color: #0d2357;
        }

        .btn-download {
            background: #2e7d32 !important; /* Verde de sucesso */
            color: white !important;
            border: none !important;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-download:hover {
            background: #1b5e20 !important;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.4);
        }

        .link-nova-ocorrência {
            margin-top: 30px;
            z-index: 1;
        }
        
        /* Garante que o container não fique com altura fixa de 220px nesta página */
        .container-final {
            height: auto !important;
            min-height: 450px;
        }
    </style>
</head>
<body onload="exibirProtocolo()">
    <header>
        <div class="headerh1">
            <h1>Ocorrência Finalizada</h1>
        </div>
    </header>

    <main>
        <section>
            <div class="container container-final">
                <div class="success-icon">✅</div>
                <h2>Relatório Concluído!</h2>
                
                <p style="color: #0d2357; font-weight: 600; margin-bottom: 5px; z-index: 1;">Protocolo:</p>
                
                <div id="numero-protocolo" class="input-padrao protocolo-box">
                    GERANDO...
                </div>

                <p style="color: #1a237e; margin-bottom: 20px; z-index: 1;">
                    Clique abaixo para baixar o arquivo oficial.
                </p>
                
                <button onclick="gerarRelatorioFinal()" class="input-padrao btn-download">
                    💾 BAIXAR RELATÓRIO PDF
                </button>

                <div class="link-nova-ocorrência">
                    <a href="index.html" style="color: #d32f2f; font-weight: bold; text-decoration: underline;">
                        Nova Ocorrência
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <h2>Sistema desenvolvido para simulações de atendimentos</h2>
    </footer>

    <script src="script.js"></script>
    <script>
        function exibirProtocolo() {
            let prot = localStorage.getItem('protocolo_atual');
            if(!prot) {
                const d = new Date();
                prot = `SOC-${d.getFullYear()}${Math.floor(1000 + Math.random() * 9000)}`;
                localStorage.setItem('protocolo_atual', prot);
            }
            document.getElementById('numero-protocolo').innerText = prot;
        }
    </script>
</body>
</html>
